---
- name: Download Vector deb package
  ansible.builtin.get_url:
    url: "{{ vector_package_url }}"
    dest: /tmp/vector.deb
    timeout: 60

- name: Install Vector
  ansible.builtin.apt:
    deb: /tmp/vector.deb

- name: Create Vector config directory
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'

- name: Create Vector config
  ansible.builtin.template:
    src: vector.toml.j2
    dest: "{{ vector_config_path }}"
    mode: '0644'
  notify: restart vector

- name: Start Vector
  ansible.builtin.systemd:
    name: "{{ vector_service_name }}"
    state: started
    enabled: yes
